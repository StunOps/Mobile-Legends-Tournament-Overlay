<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <title>ML Live — Interview Overlay</title>
  <link rel="stylesheet" href="/css/interview.css">
</head>

<body>
  <div class="iv-overlay">

    <!-- ===== E-FEST LOGO — Top Center ===== -->
    <img class="iv-efest-logo" src="/assets/E-Fest Logo3.png" alt="E-Fest">
    <div class="iv-efest-shine"></div>

    <!-- ===== MATCH STANDING AREA — Bottom Center ===== -->
    <div class="iv-match-standing">

      <!-- Team 1 (Left) -->
      <div class="iv-team iv-team1">
        <img class="iv-team-logo" id="ivTeam1Logo" src="" alt="">
        <div class="iv-team-name" id="ivTeam1Name">TEAM 1</div>
      </div>

      <!-- Score -->
      <div class="iv-score">
        <span class="iv-score-num" id="ivTeam1Score">0</span>
        <span class="iv-score-dash">-</span>
        <span class="iv-score-num" id="ivTeam2Score">0</span>
      </div>

      <!-- Team 2 (Right) -->
      <div class="iv-team iv-team2">
        <img class="iv-team-logo" id="ivTeam2Logo" src="" alt="">
        <div class="iv-team-name" id="ivTeam2Name">TEAM 2</div>
      </div>

    </div>

    <!-- ===== SPONSORS — Bottom Right ===== -->
    <div class="iv-sponsors" id="ivSponsors"></div>

  </div>
  <script src="/js/interview.js"></script>
</body>

</html>
